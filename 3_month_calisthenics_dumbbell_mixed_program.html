
<!DOCTYPE html>
<html>
<head>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans, system-ui, sans-serif); padding: 1rem 0; }
h1 { font-size: 16px; font-weight: 600; color: var(--color-text-primary); margin-bottom: 4px; }
.subtitle { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1.25rem; }
.month-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.mtab { padding: 6px 16px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); font-size: 13px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
.mtab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; border-color: var(--color-border-primary); }
.day-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.dtab { padding: 5px 12px; border-radius: 8px; border: 0.5px solid var(--color-border-secondary); font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.15s; }
.dtab.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.freq-row { display: flex; gap: 8px; align-items: center; margin-bottom: 0.85rem; flex-wrap: wrap; }
.freq-tag { font-size: 12px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); padding: 3px 10px; border-radius: 20px; color: var(--color-text-secondary); }
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-left: 6px; }
.b1 { background: #E6F1FB; color: #0C447C; }
.b2 { background: #EEEDFE; color: #3C3489; }
.b3 { background: #E1F5EE; color: #085041; }
table { width: 100%; border-collapse: collapse; }
th { font-size: 11px; color: var(--color-text-tertiary); text-align: left; padding: 6px 6px; border-bottom: 0.5px solid var(--color-border-secondary); font-weight: 500; }
td { font-size: 13px; color: var(--color-text-primary); padding: 8px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; }
tr:last-child td { border-bottom: none; }
.note { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.src-db { font-size: 10px; background: #E6F1FB; color: #0C447C; padding: 1px 6px; border-radius: 20px; display: inline-block; margin-top: 3px; }
.src-cal { font-size: 10px; background: #E1F5EE; color: #085041; padding: 1px 6px; border-radius: 20px; display: inline-block; margin-top: 3px; }
a.yt { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #CC0000; text-decoration: none; background: #FCEBEB; padding: 2px 7px; border-radius: 20px; margin-top: 2px; }
a.yt:hover { background: #F7C1C1; }
.tip-box { background: var(--color-background-secondary); border-left: 2px solid #534AB7; border-radius: 0 8px 8px 0; padding: 0.75rem 1rem; font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin-top: 0.75rem; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.dot-db { width: 8px; height: 8px; border-radius: 50%; background: #0C447C; }
.dot-cal { width: 8px; height: 8px; border-radius: 50%; background: #085041; }
@media (prefers-color-scheme: dark) {
  a.yt { background: #501313; color: #F7C1C1; }
  a.yt:hover { background: #6B1A1A; }
  .b1 { background: #0C447C; color: #B5D4F4; }
  .b2 { background: #3C3489; color: #CECBF6; }
  .b3 { background: #085041; color: #9FE1CB; }
  .src-db { background: #0C447C; color: #B5D4F4; }
  .src-cal { background: #085041; color: #9FE1CB; }
}
</style>
</head>
<body>

            { name: "Dumbbell Wrist Curl", sets: "2", reps: "15 reps", note: "2kg · builds grip for L-sit and pull-ups", src: DB, link: "https://www.youtube.com/watch?v=_MaXaFr6sHo", lt: "Tutorial" },
          ]
        }
      ]
    },
    {
      label: "Month 3", badge: "b3", badgeText: "Advanced",

      tip: "By now you should be comfortable with 5kg dumbbells on all exercises. Try moving to 5kg + 3kg (8kg) on rows and RDLs. The advanced calisthenics moves (archer push-up, pistol squat, windshield wiper) are hard — use the tutorials and be patient.",

        {

let am = 0, ad = 0;

function renderAll() {
  document.getElementById('mtabs').innerHTML = data.months.map((m, i) =>
    `<button class="mtab ${i===am?'active':''}" onclick="setM(${i})">${m.label}</button>`
  ).join('');
  const m = data.months[am];
  document.getElementById('mcontent').innerHTML = `<div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
      <span style="font-size:15px;font-weight:500;color:var(--color-text-primary)">${m.title}</span>
      <span class="badge ${m.badge}">${m.badgeText}</span>
    </div>
    <div class="freq-row">${m.freq.map(f=>`<span class="freq-tag">${f}</span>`).join('')}</div>
    <div class="day-tabs" id="dtabs"></div>
    <div id="dcontent"></div>
    <div class="tip-box">💡 ${m.tip}</div>
  </div>`;
  renderDayTabs();
  renderDay();
}

function renderDayTabs() {
  const m = data.months[am];
  document.getElementById('dtabs').innerHTML = m.days.map((d,i) =>
    `<button class="dtab ${i===ad?'active':''}" onclick="setD(${i})">${d.label}</button>`
  ).join('');
}

function renderDay() {
  const d = data.months[am].days[ad];
  let rows = d.exercises.map(e => {
    const srcBadge = e.src === DB
      ? `<span class="src-db">dumbbell</span>`
      : `<span class="src-cal">calisthenics</span>`;
    let vid = '—';
    if (e.link && e.link2) {
      vid = `<a class="yt" href="${e.link}" target="_blank">▶ ${e.lt}</a><br><a class="yt" href="${e.link2}" target="_blank" style="margin-top:4px">▶ ${e.lt2}</a>`;
    } else if (e.link) {
      vid = `<a class="yt" href="${e.link}" target="_blank">▶ ${e.lt}</a>`;
    }
    return `<tr>
      <td><div>${e.name}</div><div>${srcBadge}</div><div class="note">${e.note}</div></td>
      <td>${e.sets}</td><td>${e.reps}</td><td>${vid}</td>
    </tr>`;
  }).join('');

  document.getElementById('dcontent').innerHTML = `
    <div style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px">${d.title}</div>
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:0.75rem">${d.sub}</div>
    <table><thead><tr><th>Exercise</th><th>Sets</th><th>Reps</th><th>Video</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function setM(i) { am=i; ad=0; renderAll(); }
function setD(i) { ad=i; renderDayTabs(); renderDay(); }
renderAll();
</script>
</body>
</html>
